name: F1 App CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Backend Lint + Test ──────────────────────────────────────────────
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: services/api-gateway/package-lock.json

      - name: Install api-gateway dependencies
        run: |
          cd services/api-gateway
          npm ci

      - name: Lint api-gateway
        run: |
          cd services/api-gateway
          npx eslint . --ext .js || true

      - name: Install data-fetcher dependencies
        run: |
          cd services/data-fetcher
          npm ci

  # ── Job 2: Frontend Lint + Type Check ───────────────────────────────────────
  frontend-lint:
    name: Frontend — Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: F1App/package-lock.json

      - name: Install dependencies
        run: |
          cd F1App
          npm ci

      - name: TypeScript type check
        run: |
          cd F1App
          npx tsc --noEmit

      - name: Lint
        run: |
          cd F1App
          npx eslint src/ --ext .ts,.tsx || true

  # ── Job 3: Run Tests ─────────────────────────────────────────────────────────
  test:
    name: Frontend — Tests
    runs-on: ubuntu-latest
    needs: frontend-lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: F1App/package-lock.json

      - name: Install dependencies
        run: |
          cd F1App
          npm ci

      - name: Run tests
        run: |
          cd F1App
          npm test -- --passWithNoTests --watchAll=false

  # ── Job 4: Build Android APK ─────────────────────────────────────────────────
  build-apk:
    name: Android — Build Release APK
    runs-on: ubuntu-latest
    needs: [backend, frontend-lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: F1App/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          cd F1App
          npm ci

      - name: Make gradlew executable
        run: chmod +x F1App/android/gradlew

      - name: Build release APK
        run: |
          cd F1App/android
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: f1-app-release-${{ github.sha }}
          path: F1App/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
